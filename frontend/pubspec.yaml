name: hospital_triaje
description: Sistema de triaje hospitalario — Manchester Triage System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP + SSE
  dio: ^5.4.3+1

  # Maps
  google_maps_flutter: ^2.6.0

  # Location
  geolocator: ^13.0.1

  # Offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Push notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Auth
  google_sign_in: ^6.2.1

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # URL launching (tel:, etc.)
  url_launcher: ^6.3.0

  # Utilities
  intl: 0.20.2
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf

